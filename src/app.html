<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />

    <!-- Viewport & PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="color-scheme" content="light dark" />

    <!-- PWA / installable -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BKW" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />

    <!-- Favicon -->
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />

    <!-- SEO -->
    <meta name="description" content="BKW Solar Dashboard – Ertrag, Verbrauch &amp; Prognose" />
    <meta name="application-name" content="BKW Solar Dashboard" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Stylesheets -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="%sveltekit.assets%/style.css" rel="stylesheet" />

    %sveltekit.head%
  </head>
  <body>
    <div>%sveltekit.body%</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

    <!-- Service Worker registrieren -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              // Auf neue Version prüfen (silent)
              reg.addEventListener('updatefound', () => {
                const newWorker = reg.installing;
                if (!newWorker) return;
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Neue Version verfügbar – optional: Toast anzeigen
                    console.log('[SW] Update verfügbar – bitte Seite neu laden.');
                  }
                });
              });
            })
            .catch(err => console.warn('[SW] Registrierung fehlgeschlagen:', err));
        });
      }
    </script>
  </body>
</html>
